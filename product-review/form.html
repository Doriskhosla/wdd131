<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form></title>
    <link rel="stylesheet" href="styles/form.css">
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">

            <!-- PRODUCT NAME -->
            <label for="productName">Product Name</label>

            <select id="ProductName" name="productName" required>
                <option value="" disabled selected>Selected a Product...</option>
            </select>

            <!-- You will add the rest of the fields later (rating, date, etc.)-->

            <button type="submit">Submit Review</button>


            <!-- Rating -->
            <fieldset>
                <legend>Overall Rating</legend>
                <label><input type="radio" name="rating" value="1" required> 1 ★</label>
                <label><input type="radio" name="rating" value="2"> 2 ★★</label>
                <label><input type="radio" name="rating" value="3"> 3 ★★★</label>
                <label><input type="radio" name="rating" value="4"> 4 ★★★★</label>
                <label><input type="radio" name="rating" value="5"> 5 ★★★★★</label>
            </fieldset>

            <!-- Date -->

            <label for="installDate">Date of Installation</label>

            <input type="date" id="installDate" name="installDate" required>

            <!-- Features -->

            <fieldset>
                <legend>Useful Features</legend>
                <label><input type="checkbox" name="features" value="durability"> Durability</label>
                <label><input type="checkbox" name="features" value="ease"> Ease of Use</label>
                <label><input type="checkbox" name="features" value="design"> Design</label>
            </fieldset>

            <!-- Review -->
            <label for="review">Written Review</label>
            <textarea id="review" name="review"></textarea>

            <!-- Name -->
            <label for="username">Your Name</label>
            <input type="text" id="username" name="username">

            <!-- Submit -->
            <input type="submit" value="Submit Review">

        </form>


        <footer>
            <p>&copy; <span id="year"></span> | WDD 131 - Dynamic Web Fundamentals</p>
        </footer>
        <script src="scripts/form.js"></script>
        <script>
            // Footer year

            document.getElementById("year").textContent = new Date().getFullYear();
        </script>

    </main>
</body>
