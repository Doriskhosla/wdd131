<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Italy country Page</title>

    <link rel="stylesheet" href="styles/place.css">

    <script src="scripts/place.js" defer></script>

</head>

<body>
    <header>
        <h1>Italy</h1>
    </header>

    <main>
        <picture>
            <source srcset="images/pitigliano-hero-large.webp" media="(min-width: 768px)">
            <img src="images/pitigliano-hero-small.webp" alt="Pitigliano cliffside town in Italy" width="800"
                height="500">

        </picture>


        <section>
            <h2>Data</h2>
            <p><strong>Capital:</strong> Rome</p>
            <p><strong>Population:</strong> 59 million</p>
            <p><strong>Language:</strong> Italian</p>

        </section>

        <section class="weather">

            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather icon" class="weather-icon">
            <p>Temperature: <span id="temp">8</span>°C</p>
            <p>Wind Speed: <span id="wind">10</span> km/h</p>
            <p>Wind Chill: <span id="wind-chill">0</span>°C</p>

        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Italy Country Page</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
