<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="...">
    <title>Italy country Page</title>

    <!-- Load Playfair Display font-->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/place.css">

    <script src="scripts/place.js" defer></script>

</head>

<body>
    <header>
        <h1>Italy</h1>
    </header>

    <main class="hero-container">

        <picture>
            <source srcset="images/pitigliano-hero-large.webp" media="(min-width: 768px)">
            <img src="images/pitigliano-hero-small.webp" alt="Pitigliano cliffside town in Italy" width="800" height="">
        </picture>

        <section class="data">
            <h2>Data</h2>
            <p><strong>Capital:</strong> Rome</p>
            <p><strong>Population:</strong> 2.7 million</p>
            <p><strong>Language:</strong> Italian</p>
        </section>

        <section class="weather">
            <h2>Weather</h2>

            <p>Temperature: <span id="temp">8</span>°C</p>
            <p>Wind Speed: <span id="wind">10</span> km/h</p>
            <p>Wind Chill: <span id="wind-chill">N/A</span>°C</p>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Italy Country Page | Maria D. Khosla | WDD131 |</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
